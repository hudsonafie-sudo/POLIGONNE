<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Betta - Jogar</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▶️</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .menu {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .menu h1 {
            font-size: 2.4em;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }
        .menu a {
            display: block;
            padding: 16px 48px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: bold;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .menu a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .btn-play {
            background: linear-gradient(135deg, #2a9d5c, #1e7a45);
            color: #fff;
        }
        .btn-map {
            background: linear-gradient(135deg, #3a6fb5, #2a5490);
            color: #dde8f5;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div class="menu">
        <h1>Betta</h1>
        <a href="dev.html?play" class="btn-play">Jogar</a>
        <a href="dev.html?modomapa" class="btn-map">Modo Mapa</a>
    </div>
</body>
</html>
